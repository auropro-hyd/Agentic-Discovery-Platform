name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Command(s) run, domain, provider (anthropic/azure), and the output.
      placeholder: |
        cd prototype && uv run python run.py --domain o2c --auto-resolve
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "uv version, OS, provider"
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / traceback
      render: shell
