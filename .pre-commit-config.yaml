# Pre-commit hooks. Install once:  pre-commit install
# Run on all files:                pre-commit run --all-files
repos:
  - repo: local
    hooks:
      # Type-check the shippable product code (discovery/ + run.py + scripts/) with pyrefly.
      # Tests are intentionally excluded — their fixtures are deliberately loosely typed.
      - id: pyrefly
        name: pyrefly (type check, product code)
        entry: bash -c 'cd v1 && uv run pyrefly check discovery run.py scripts'
        language: system
        pass_filenames: false
        files: ^v1/(discovery/|run\.py|scripts/).*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # the input/golden JSON can be large but valid; keep the check
      - id: check-added-large-files
        args: ["--maxkb=2048"]
